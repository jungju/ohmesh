apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ohmesh
  labels:
    app.kubernetes.io/name: ohmesh
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ohmesh.okgo.click
      secretName: ohmesh-tls
  rules:
    - host: ohmesh.okgo.click
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ohmesh
                port:
                  name: http
