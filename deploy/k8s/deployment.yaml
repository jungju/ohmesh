apiVersion: apps/v1
kind: Deployment
metadata:
  name: ohmesh
  labels:
    app.kubernetes.io/name: ohmesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ohmesh
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ohmesh
    spec:
      containers:
        - name: ohmesh
          image: ghcr.io/jungju/ohmesh:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ohmesh-config
            - secretRef:
                name: ohmesh-oauth
                optional: true
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ohmesh-data
